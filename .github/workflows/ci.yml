name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install gcov2lcov
        run: go install github.com/jandelgado/gcov2lcov@latest

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            $(go list ./internal/... | grep -v /mocks)

      - name: Check coverage threshold
        run: |
          grep -v '/mocks/' coverage.out | grep -v 'internal/docker/client.go' > coverage-filtered.out
          COVERAGE=$(go tool cover -func=coverage-filtered.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Coverage (excluding mocks & docker daemon): ${COVERAGE}%"
          THRESHOLD=80
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Convert coverage to LCOV
        run: gcov2lcov -infile coverage.out -outfile lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

  base-coverage:
    name: Base Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install gcov2lcov
        run: go install github.com/jandelgado/gcov2lcov@latest

      - name: Run base branch tests with coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic \
            $(go list ./internal/... | grep -v /mocks) || true

      - name: Convert to LCOV
        run: gcov2lcov -infile coverage.out -outfile base-lcov.info || true

      - name: Upload base coverage
        uses: actions/upload-artifact@v4
        with:
          name: base-lcov
          path: base-lcov.info

  coverage-report:
    name: Coverage Report
    if: github.event_name == 'pull_request'
    needs: [test, base-coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lcov
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: base-lcov
          path: .

      - name: Barecheck coverage report
        uses: barecheck/code-coverage-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./lcov.info
          base-lcov-file: ./base-lcov.info
          send-summary-comment: true
          show-annotations: warning

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: go build -o bin/updock ./cmd/updock

      - name: Verify binary
        run: ./bin/updock --version
