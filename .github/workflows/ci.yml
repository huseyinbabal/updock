name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            $(go list ./internal/... | grep -v /mocks)

      - name: Generate coverage report
        id: coverage
        run: |
          # Filtered coverage (excluding mocks & docker daemon)
          grep -v '/mocks/' coverage.out | grep -v 'internal/docker/client.go' > coverage-filtered.out
          COVERAGE=$(go tool cover -func=coverage-filtered.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"
          echo "Coverage (excluding mocks & docker daemon): ${COVERAGE}%"

          # Total coverage
          TOTAL=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"

          # Threshold check
          THRESHOLD=80
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: updock-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          minColorRange: 50
          maxColorRange: 90

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const total = '${{ steps.coverage.outputs.total }}';

            const body = `## Coverage Report

            | Metric | Value |
            |--------|-------|
            | **Filtered coverage** (excl. mocks & docker daemon) | \`${coverage}%\` |
            | **Total coverage** | \`${total}%\` |
            | **Threshold** | \`80%\` |

            > Filtered coverage excludes generated mocks and Docker daemon I/O code that requires a live Docker socket.`;

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Coverage Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        run: go build -o bin/updock ./cmd/updock

      - name: Verify binary
        run: ./bin/updock --version
