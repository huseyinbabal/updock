site_name: Updock
site_description: Declarative container update platform with policy engine and Web UI
site_url: https://updock.dev
repo_name: huseyinbabal/updock
repo_url: https://github.com/huseyinbabal/updock

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.path
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Overview: index.md
  - Quick Start: getting-started.md
  - Core Concepts:
    - Update Policies: policies.md
    - Container Targeting: container-selection.md
    - Audit Trail: audit-log.md
  - Dashboard & API:
    - Web Dashboard: web-ui.md
    - REST API Reference: http-api.md
    - Observability: metrics.md
  - Advanced:
    - Lifecycle Hooks: lifecycle-hooks.md
    - Dependency Ordering: linked-containers.md
    - Registry Authentication: private-registries.md
    - Fleet & Multi-Instance: multiple-instances.md
    - Notifications & Webhooks: notifications.md
  - Examples:
    - Web Dashboard Usage: examples/web-dashboard.md
    - Homelab Media Server: examples/homelab-media.md
    - Web App with Database: examples/webapp-database.md
    - CI/CD One-Shot Check: examples/ci-cd-check.md
    - Multi-Environment Fleet: examples/multi-env.md
    - Zero-Downtime Rolling Update: examples/zero-downtime.md
    - Private Registry (ECR/GCR): examples/private-registry.md
    - Monitoring Stack: examples/monitoring-stack.md
    - IoT Edge Devices: examples/iot-edge.md
    - WordPress + Plugins: examples/wordpress.md
    - Microservices with Dependencies: examples/microservices.md
  - Reference:
    - CLI & Environment: arguments.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
