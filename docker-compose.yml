services:
  updock:
    build: .
    container_name: updock
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - UPDOCK_INTERVAL=5m
      - UPDOCK_MONITOR_ALL=true
      - UPDOCK_CLEANUP_IMAGES=false
      - UPDOCK_HTTP_ADDR=:8080
      - UPDOCK_LOG_LEVEL=info
      # - UPDOCK_SCHEDULE=0 */6 * * * *
      # - UPDOCK_WEBHOOK_URL=https://hooks.example.com/updock
      # - UPDOCK_DRY_RUN=true
    labels:
      com.updock.disable: "true"
