# Updock - Declarative container update policies
#
# This file defines how Updock manages your containers. Unlike simple
# auto-updaters, Updock gives you fine-grained control over what gets
# updated, when, and how.
#
# Place this file next to your docker-compose.yml or mount it into
# the Updock container at /etc/updock/updock.yml

# Policies define reusable update strategies.
# Every container is assigned a policy (defaults to "default").
policies:

  # The default policy: update everything automatically, rollback on failure.
  default:
    strategy: all          # all | major | minor | patch | digest | pin
    approve: auto          # auto | manual
    rollback: on-failure   # on-failure | never
    health_timeout: 30s    # how long to wait for health check after update

  # Conservative policy: only patch updates, auto-approved.
  conservative:
    strategy: patch
    approve: auto
    rollback: on-failure

  # Locked policy: never auto-update, require manual approval via UI.
  locked:
    strategy: pin
    approve: manual

# Per-container configuration.
# Assign policies, set maintenance windows, or ignore containers entirely.
containers:
  # Example: only update nginx during nighttime
  # nginx:
  #   policy: default
  #   schedule: "02:00-05:00"

  # Example: never auto-update the database
  # postgres:
  #   policy: locked

  # Example: completely ignore this container
  # legacy-app:
  #   ignore: true

# Groups define sets of containers that should be updated together.
# Useful for multi-container applications (e.g. web app + database + cache).
groups: {}
  # Example: update redis first, then app, then nginx
  # web-stack:
  #   members: [nginx, app, redis]
  #   strategy: rolling
  #   order: [redis, app, nginx]
